<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Horror - SkyViper</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; }
        #ui { position: absolute; top: 20px; left: 20px; color: white; z-index: 100; }
        #stamina-box { width: 200px; height: 10px; border: 1px solid #444; background: #222; }
        #stamina-bar { width: 100%; height: 100%; background: #0f0; }
        #msg { font-size: 12px; margin-top: 5px; }
    </style>
</head>
<body>
    <div id="ui">
        <div id="stamina-box"><div id="stamina-bar"></div></div>
        <div id="msg">WASD: Move | Shift: Sprint | C: Crouch | Space: Jump</div>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // Scene Setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000000);
        scene.fog = new THREE.Fog(0x000000, 1, 15);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.rendererElement || renderer.domElement);

        // Lights
        const light = new THREE.PointLight(0xff0000, 10, 10); // Red horror light
        scene.add(light);
        const ambient = new THREE.AmbientLight(0x111111);
        scene.add(ambient);

        // Black Ground
        const floorGeo = new THREE.PlaneGeometry(100, 100);
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x050505 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        // 3D Player (Representing the Churail/Character)
        const playerGeo = new THREE.CapsuleGeometry(0.5, 1, 4, 8);
        const playerMat = new THREE.MeshStandardMaterial({ color: 0x330000 });
        const player = new THREE.Mesh(playerGeo, playerMat);
        player.position.y = 1;
        scene.add(player);

        // Movement Variables
        let stamina = 100;
        let isJumping = false;
        let yVelocity = 0;
        const keys = {};

        window.addEventListener('keydown', (e) => keys[e.code] = true);
        window.addEventListener('keyup', (e) => keys[e.code] = false);

        function animate() {
            requestAnimationFrame(animate);

            let speed = 0.1;
            const bar = document.getElementById('stamina-bar');

            // Crouch
            if (keys['KeyC']) {
                speed = 0.04;
                player.scale.y = 0.5;
            } else {
                player.scale.y = 1;
            }

            // Sprint
            if (keys['ShiftLeft'] && stamina > 0 && !keys['KeyC']) {
                speed = 0.2;
                stamina -= 0.5;
            } else if (stamina < 100) {
                stamina += 0.2;
            }

            // Movement
            if (keys['KeyW']) player.position.z -= speed;
            if (keys['KeyS']) player.position.z += speed;
            if (keys['KeyA']) player.position.x -= speed;
            if (keys['KeyD']) player.position.x += speed;

            // Jump
            if (keys['Space'] && !isJumping) {
                isJumping = true;
                yVelocity = 0.15;
            }

            if (isJumping) {
                player.position.y += yVelocity;
                yVelocity -= 0.008; // Gravity
                if (player.position.y <= 1) {
                    player.position.y = 1;
                    isJumping = false;
                }
            }

            // Camera follow
            camera.position.set(player.position.x, player.position.y + 2, player.position.z + 5);
            camera.lookAt(player.position);
            light.position.set(player.position.x, player.position.y + 2, player.position.z);

            // UI
            bar.style.width = stamina + "%";
            bar.style.backgroundColor = stamina < 25 ? "red" : "#0f0";

            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
