<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Void Aura | Horror Game</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            color: #4a0000;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            cursor: none;
        }

        /* Camera / Player Container */
        #world {
            position: relative;
            width: 100%;
            height: 100vh;
            transition: transform 0.2s ease; /* Crouch effect ke liye */
        }

        #game-screen {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            transition: all 0.1s linear;
        }

        #flashlight {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle 150px at center, transparent 10%, rgba(0, 0, 0, 0.98) 100%);
            pointer-events: none;
            z-index: 100;
        }

        h1 { font-size: 4rem; letter-spacing: 15px; text-shadow: 0 0 10px #ff0000; }
        
        #jumpscare {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: url('https://i.imgur.com/vH97Z9O.jpg') center/cover;
            z-index: 1000;
        }

        #status-bar {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: #555;
            font-size: 0.8rem;
            z-index: 110;
        }
    </style>
</head>
<body>

    <div id="flashlight"></div>

    <div id="world">
        <div id="game-screen">
            <h1 id="title">VOID AURA</h1>
            <p id="ui-text">WASD se chalo... C se jhuko...</p>
            <button style="color:#8b0000; background:none; border:1px solid #4a0000; padding:10px; cursor:pointer;" onclick="this.style.display='none'">START SENSORS</button>
        </div>
    </div>

    <div id="jumpscare"></div>
    <div id="status-bar">STATUS: STANDING</div>

    <audio id="scare-sound" src="https://www.soundjay.com/human/sounds/shriek-01.mp3"></audio>

    <script>
        const flashlight = document.getElementById('flashlight');
        const world = document.getElementById('world');
        const gameScreen = document.getElementById('game-screen');
        const statusBar = document.getElementById('status-bar');
        
        let posX = 0;
        let posY = 0;
        let isCrouching = false;

        // Flashlight Follow
        document.addEventListener('mousemove', (e) => {
            flashlight.style.background = `radial-gradient(circle 150px at ${e.clientX}px ${e.clientY}px, transparent 10%, rgba(0, 0, 0, 0.98) 80%)`;
        });

        // Movement & Crouch Logic
        document.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            const speed = isCrouching ? 5 : 15; // Crouch mein speed kam

            if (key === 'w') posY += speed;
            if (key === 's') posY -= speed;
            if (key === 'a') posX += speed;
            if (key === 'd') posX -= speed;

            // Crouch toggle
            if (key === 'c') {
                isCrouching = true;
                world.style.transform = "translateY(50px)"; // Screen niche ho jayegi
                statusBar.innerText = "STATUS: CROUCHING";
                statusBar.style.color = "red";
            }

            // Apply Movement
            gameScreen.style.transform = `translate(${posX}px, ${posY}px)`;
        });

        document.addEventListener('keyup', (e) => {
            if (e.key.toLowerCase() === 'c') {
                isCrouching = false;
                world.style.transform = "translateY(0px)"; // Screen wapas upar
                statusBar.innerText = "STATUS: STANDING";
                statusBar.style.color = "#555";
            }
        });

        // Random Scare Logic (Pichle code ki tarah)
        setTimeout(() => {
            if(Math.random() > 0.5) {
                const jumpscare = document.getElementById('jumpscare');
                const scareSound = document.getElementById('scare-sound');
                jumpscare.style.display = 'block';
                scareSound.play();
                setTimeout(() => { jumpscare.style.display = 'none'; }, 1000);
            }
        }, 10000);
    </script>
</body>
</html>
