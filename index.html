<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOID AURA - FIXED LOOK</title>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; background: #000; }
        #ui { position: absolute; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: #000; color: #f00; z-index: 30; font-family: 'Courier New', monospace; }
        #start { padding: 20px 50px; font-size: 24px; background: #900; color: #fff; border: 2px solid #fff; cursor: pointer; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 4px; height: 4px; background: #fff; border-radius: 50%; pointer-events: none; }
    </style>
</head>
<body>

<div id="ui">
    <h1>VOID AURA</h1>
    <button id="start">START MISSION</button>
</div>
<div id="crosshair"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/controls/PointerLockControls.js"></script>
<script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/loaders/GLTFLoader.js"></script>

<script>
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x050505);
    scene.fog = new THREE.FogExp2(0x050505, 0.05);

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputEncoding = THREE.sRGBEncoding;
    document.body.appendChild(renderer.domElement);

    // Full Bright Light taaki Ghost dikhe
    const light = new THREE.AmbientLight(0xffffff, 2); 
    scene.add(light);

    // Mouse Controls (Fixed for 360 Rotation)
    const controls = new THREE.PointerLockControls(camera, document.body);
    document.getElementById('start').onclick = () => {
        controls.lock();
    };

    controls.addEventListener('lock', () => document.getElementById('ui').style.display = 'none');
    controls.addEventListener('unlock', () => document.getElementById('ui').style.display = 'flex');

    const ground = new THREE.Mesh(new THREE.PlaneGeometry(1000, 1000), new THREE.MeshStandardMaterial({ color: 0x111111 }));
    ground.rotation.x = -Math.PI / 2;
    scene.add(ground);

    /* --- GHOST GIRL SPAWN (DIRECTLY IN FRONT) --- */
    let ghost = null, mixer = null;
    const clock = new THREE.Clock();
    const loader = new THREE.GLTFLoader();

    loader.load('./ghost_girl.glb', (gltf) => {
        ghost = gltf.scene;
        ghost.scale.set(1.5, 1.5, 1.5);
        
        // Isse Ghost bilkul aapke samne spawn hogi (Z axis par)
        ghost.position.set(0, 0, -10); 
        scene.add(ghost);

        mixer = new THREE.AnimationMixer(ghost);
        if (gltf.animations.length > 0) mixer.clipAction(gltf.animations[0]).play();
    });

    const keys = {};
    document.onkeydown = (e) => keys[e.code] = true;
    document.onkeyup = (e) => keys[e.code] = false;

    camera.position.y = 1.7; // Human Height

    function animate() {
        requestAnimationFrame(animate);
        const delta = clock.getDelta();
        if (mixer) mixer.update(delta);

        if (controls.isLocked) {
            // Player speed (Slowed for control)
            let speed = keys['ShiftLeft'] ? 0.2 : 0.1;

            if (keys['KeyW']) controls.moveForward(speed);
            if (keys['KeyS']) controls.moveForward(-speed);
            if (keys['KeyA']) controls.moveRight(-speed);
            if (keys['KeyD']) controls.moveRight(speed);

            if (ghost) {
                // Ghost movement logic
                let ghostDir = new THREE.Vector3().subVectors(camera.position, ghost.position);
                ghostDir.y = 0;
                ghostDir.normalize();
                
                // Ghost speed (Very slow so you can see her)
                ghost.position.add(ghostDir.multiplyScalar(0.04)); 
                ghost.lookAt(camera.position.x, 0, camera.position.z);

                // Collision
                if (ghost.position.distanceTo(camera.position) < 1.5) {
                    controls.unlock();
                    alert("GHOST GOT YOU!");
                    location.reload();
                }
            }
        }
        renderer.render(scene, camera);
    }
    animate();

    // Window Resize Fix
    window.onresize = () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    };
</script>
</body>
</html>
