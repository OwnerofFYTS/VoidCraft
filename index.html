<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoidCraft | Enter the Void</title>
    <style>
        /* DESIGN UNTOUCHED */
        body { margin: 0; padding: 0; background: radial-gradient(circle at center, #0a192f 0%, #020c1b 100%); color: #e6f1ff; font-family: 'Inter', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        nav { display: flex; justify-content: flex-end; padding: 25px 60px; gap: 20px; align-items: center; z-index: 10; }
        .login-btn { color: #8892b0; background: none; border: none; font-size: 15px; font-weight: 500; cursor: pointer; }
        .signup-btn { background-color: transparent; color: #64ffda; border: 1px solid #64ffda; padding: 10px 22px; border-radius: 4px; cursor: pointer; font-size: 14px; font-weight: 600; }
        .hero { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding-bottom: 80px; }
        h1 { font-size: clamp(50px, 12vw, 100px); margin: 0; font-weight: 800; color: #ccd6f6; letter-spacing: -2px; }
        .sub-text { color: #8892b0; font-size: 18px; margin-top: 5px; letter-spacing: 4px; text-transform: uppercase; }
        .get-started { margin-top: 65px; padding: 20px 65px; font-size: 18px; font-weight: 700; color: #0a192f; background-color: #64ffda; border: none; border-radius: 5px; cursor: pointer; }

        /* AUTH MODAL */
        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(2, 12, 27, 0.9); backdrop-filter: blur(8px); }
        .modal-content { background-color: #112240; margin: 8% auto; padding: 30px; border-radius: 16px; width: 350px; text-align: center; border: 1px solid #233554; }
        input { width: 100%; padding: 12px; margin: 8px 0; background: #0a192f; border: 1px solid #233554; color: white; border-radius: 6px; box-sizing: border-box; }
        .submit-btn { width: 100%; padding: 12px; background: #64ffda; color: #0a192f; border: none; border-radius: 6px; font-weight: bold; margin-top: 15px; cursor: pointer; }
        .switch-text { color: #8892b0; font-size: 13px; margin-top: 15px; cursor: pointer; display: block; }

        /* VOIDCRAFT 3D ENGINE AREA */
        #game-view { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; }
        canvas { width: 100%; height: 100%; }

        /* HUD - UI ELEMENTS */
        #crosshair { position: fixed; top: 50%; left: 50%; width: 24px; height: 24px; transform: translate(-50%, -50%); pointer-events: none; z-index: 1010; }
        #crosshair:before { content: ''; position: absolute; top: 0; left: 11px; width: 2px; height: 24px; background: #64ffda; }
        #crosshair:after { content: ''; position: absolute; top: 11px; left: 0; width: 24px; height: 2px; background: #64ffda; }

        #hotbar { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(10, 25, 47, 0.9); border: 2px solid #64ffda; padding: 15px 40px; border-radius: 8px; z-index: 1010; color: white; font-weight: bold; font-family: monospace; }
    </style>
</head>
<body>

    <nav id="top-nav">
        <button class="login-btn" onclick="openAuth('login')">Login</button>
        <button class="signup-btn" onclick="openAuth('signup')">Sign Up</button>
    </nav>

    <div class="hero" id="home-hero">
        <h1>VoidCraft</h1>
        <p class="sub-text">Beyond the horizon</p>
        <button class="get-started" onclick="initGameFlow()">Get Started</button>
    </div>

    <div id="authModal" class="modal">
        <div class="modal-content">
            <h2 id="modalTitle">Sign Up</h2>
            <div id="signup-inputs">
                <input type="text" placeholder="First Name">
                <input type="text" placeholder="Last Name">
            </div>
            <input type="email" placeholder="Email Address">
            <input type="password" placeholder="Password">
            <button class="submit-btn" onclick="launchGame()">Start Playing</button>
            <p class="switch-text" onclick="toggleAuth()">Already have account? <span>Login</span></p>
        </div>
    </div>

    <div id="game-view">
        <div id="crosshair"></div>
        <div id="hotbar">INV: <span id="item-slot">Searching...</span></div>
        <canvas id="void-canvas"></canvas>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        const modal = document.getElementById('authModal');
        let loggedIn = false;

        function openAuth(mode) { modal.style.display = 'block'; }
        function closeModal() { modal.style.display = 'none'; }
        function toggleAuth() { /* Switch logic */ }

        function initGameFlow() { if(!loggedIn) openAuth('signup'); else launchGame(); }

        function launchGame() {
            loggedIn = true;
            closeModal();
            document.getElementById('top-nav').style.display = 'none';
            document.getElementById('home-hero').style.display = 'none';
            document.getElementById('game-view').style.display = 'block';
            startVoidEngine();
        }

        function startVoidEngine() {
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x020c1b);
            
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({canvas: document.getElementById('void-canvas'), antialias: true});
            renderer.setSize(window.innerWidth, window.innerHeight);

            // THE LAVA (30 Blocks Below)
            const lavaGeo = new THREE.PlaneGeometry(500, 500);
            const lavaMat = new THREE.MeshBasicMaterial({color: 0xff4400, side: THREE.DoubleSide});
            const lava = new THREE.Mesh(lavaGeo, lavaMat);
            lava.rotation.x = Math.PI / 2;
            lava.position.y = -30;
            scene.add(lava);

            // THE 8 TOWERS
            const towerGeo = new THREE.BoxGeometry(6, 1, 6);
            const towerMat = new THREE.MeshStandardMaterial({color: 0x444d56});
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
            scene.add(ambientLight);
            const sun = new THREE.PointLight(0x64ffda, 1, 100);
            sun.position.set(0, 20, 0);
            scene.add(sun);

            for(let i=0; i<8; i++) {
                const tower = new THREE.Mesh(towerGeo, towerMat);
                const angle = (i / 8) * Math.PI * 2;
                tower.position.set(Math.cos(angle) * 30, 0, Math.sin(angle) * 30);
                scene.add(tower);
            }

            camera.position.set(30, 3, 30);
            camera.lookAt(0, 0, 0);

            // WASD CONTROLS
            const keys = {};
            window.addEventListener('keydown', (e) => keys[e.key.toLowerCase()] = true);
            window.addEventListener('keyup', (e) => keys[e.key.toLowerCase()] = false);

            // LUCKY ITEM SYSTEM (5 SECONDS)
            const items = ["OBSIDIAN BLOCK", "NETHER SWORD", "GRAVITY BOW", "LUCKY BOX", "ENDER SHARD"];
            setInterval(() => {
                const item = items[Math.floor(Math.random() * items.length)];
                document.getElementById('item-slot').innerText = item;
            }, 5000);

            function animate() {
                requestAnimationFrame(animate);
                if(keys['w']) camera.position.z -= 0.4;
                if(keys['s']) camera.position.z += 0.4;
                if(keys['a']) camera.position.x -= 0.4;
                if(keys['d']) camera.position.x += 0.4;

                if(camera.position.y < -28) {
                    alert("VOIDCRAFT: YOU DIED IN LAVA!");
                    camera.position.set(30, 3, 30);
                }
                renderer.render(scene, camera);
            }
            animate();
        }
    </script>
</body>
</html>
