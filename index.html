<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoidCraft | Enter the Void</title>
    <style>
        /* CSS MEIN KOI TABDEELI NAHI KI GAYI (AS REQUESTED) */
        body {
            margin: 0; padding: 0;
            background: radial-gradient(circle at center, #0a192f 0%, #020c1b 100%);
            color: #e6f1ff; font-family: 'Inter', sans-serif;
            height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        nav { display: flex; justify-content: flex-end; padding: 25px 60px; gap: 20px; align-items: center; z-index: 10; }
        .login-btn { color: #8892b0; background: none; border: none; font-size: 15px; font-weight: 500; cursor: pointer; }
        .signup-btn { background-color: transparent; color: #64ffda; border: 1px solid #64ffda; padding: 10px 22px; border-radius: 4px; cursor: pointer; font-size: 14px; font-weight: 600; }
        
        .hero { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding-bottom: 80px; }
        h1 { font-size: clamp(50px, 12vw, 100px); margin: 0; font-weight: 800; color: #ccd6f6; letter-spacing: -2px; }
        .sub-text { color: #8892b0; font-size: 18px; margin-top: 5px; letter-spacing: 4px; text-transform: uppercase; }
        
        .get-started { margin-top: 65px; padding: 20px 65px; font-size: 18px; font-weight: 700; color: #0a192f; background-color: #64ffda; border: none; border-radius: 5px; cursor: pointer; }

        /* GAME OVERLAY (Naya Hissa) */
        #game-container {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 1000;
        }

        #game-menu {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; z-index: 1001;
        }

        .mode-btn {
            display: block; width: 250px; padding: 20px; margin: 15px;
            background: #112240; color: #64ffda; border: 2px solid #64ffda;
            border-radius: 8px; font-size: 20px; font-weight: bold; cursor: pointer;
            text-transform: uppercase; transition: 0.3s;
        }
        .mode-btn:hover { background: #64ffda; color: #0a192f; }

        iframe { width: 100%; height: 100%; border: none; display: none; }
    </style>
</head>
<body>

    <nav id="main-nav">
        <button class="login-btn" onclick="initGame()">Login</button>
        <button class="signup-btn" onclick="initGame()">Sign Up</button>
    </nav>

    <div class="hero" id="main-hero">
        <h1>VoidCraft</h1>
        <p class="sub-text">Beyond the horizon</p>
        <button class="get-started" onclick="initGame()">Get Started</button>
    </div>

    <div id="game-container">
        <div id="game-menu">
            <h2 style="color: white; margin-bottom: 30px; font-size: 32px;">SELECT GAME MODE</h2>
            <button class="mode-btn" onclick="launchPixelGame('survival')">Survival</button>
            <button class="mode-btn" onclick="launchPixelGame('towers')">Lucky Towers</button>
            <p style="color: #8892b0; margin-top: 20px; cursor:pointer;" onclick="location.reload()">← Back to Home</p>
        </div>
        <iframe id="game-frame" src=""></iframe>
    </div>

    <script>
        function initGame() {
            // Home screen chupao aur Game Menu dikhao
            document.getElementById('main-nav').style.display = 'none';
            document.getElementById('main-hero').style.display = 'none';
            document.getElementById('game-container').style.display = 'block';
        }

        function launchPixelGame(mode) {
            const frame = document.getElementById('game-frame');
            const menu = document.getElementById('game-menu');
            
            menu.style.display = 'none';
            frame.style.display = 'block';

            // Bloxd.io jaisi 3D Pixel Game load ho rahi hai
            if(mode === 'survival') {
                frame.src = "https://bloxd.io/?mode=survival"; 
            } else {
                frame.src = "https://bloxd.io/?mode=oneblock"; // Lucky/Tower style mode
            }
        }
    </script>
</body>
</html>
