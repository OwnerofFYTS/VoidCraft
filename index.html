<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VOID AURA - RED BLOCK TEST</title>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        #ui { position: absolute; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: #000; color: #fff; z-index: 1000; }
        #start-btn { padding: 15px 40px; font-size: 20px; background: #900; color: #fff; border: 2px solid #fff; cursor: pointer; }
    </style>
</head>
<body>

<div id="ui">
    <h1 style="color:red">VOID AURA</h1>
    <button id="start-btn">START GAME</button>
    <p>Samne Red Block ko dekhein movement check karne ke liye</p>
</div>

<script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/controls/PointerLockControls.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

<script>
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x050505);

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const light = new THREE.AmbientLight(0xffffff, 1.5);
    scene.add(light);

    const controls = new THREE.PointerLockControls(camera, document.body);
    document.getElementById('start-btn').onclick = () => controls.lock();
    controls.addEventListener('lock', () => document.getElementById('ui').style.display = 'none');
    controls.addEventListener('unlock', () => document.getElementById('ui').style.display = 'flex');

    // Zameen (Grid ke saath)
    const grid = new THREE.GridHelper(200, 40, 0x333333, 0x222222);
    scene.add(grid);

    // --- SAMNE WALA RED BLOCK ---
    const geometry = new THREE.BoxGeometry(4, 4, 4);
    const material = new THREE.MeshStandardMaterial({ color: 0xff0000 });
    const redBlock = new THREE.Mesh(geometry, material);
    redBlock.position.set(0, 2, -15); // Bilkul samne 15 units door
    scene.add(redBlock);

    /* --- GHOST --- */
    let ghost = null, mixer = null;
    const clock = new THREE.Clock();
    const loader = new THREE.GLTFLoader();

    loader.load('./ghost_girl.glb', (gltf) => {
        ghost = gltf.scene;
        ghost.scale.set(1.5, 1.5, 1.5);
        ghost.position.set(0, 0, -10); // Ghost block se thoda pehle hogi
        scene.add(ghost);
        mixer = new THREE.AnimationMixer(ghost);
        if (gltf.animations.length > 0) mixer.clipAction(gltf.animations[0]).play();
    });

    const keys = {};
    window.onkeydown = (e) => keys[e.code] = true;
    window.onkeyup = (e) => keys[e.code] = false;

    camera.position.y = 1.7;

    function animate() {
        requestAnimationFrame(animate);
        const delta = clock.getDelta();
        if (mixer) mixer.update(delta);

        if (controls.isLocked) {
            let speed = keys['ShiftLeft'] ? 0.3 : 0.15;
            if (keys['KeyW']) controls.moveForward(speed);
            if (keys['KeyS']) controls.moveForward(-speed);
            if (keys['KeyA']) controls.moveRight(-speed);
            if (keys['KeyD']) controls.moveRight(speed);

            if (ghost) {
                let dir = new THREE.Vector3().subVectors(camera.position, ghost.position);
                dir.y = 0; dir.normalize();
                ghost.position.add(dir.multiplyScalar(0.05));
                ghost.lookAt(camera.position.x, 0, camera.position.z);
            }
        }
        renderer.render(scene, camera);
    }
    animate();
</script>
</body>
</html>
