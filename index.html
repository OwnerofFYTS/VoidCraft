<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyViper | Gaming</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        body {
            height: 100vh;
            background: radial-gradient(circle at center, #1a1a2e 0%, #08080a 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            overflow: hidden;
        }

        /* Navbar for Top Right */
        .navbar {
            position: absolute;
            top: 20px;
            right: 30px;
        }

        .nav-btn {
            padding: 10px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
            border: 1px solid #4facfe;
            font-size: 14px;
            background: transparent;
            color: #4facfe;
        }

        .nav-btn:hover { background: rgba(79, 172, 254, 0.1); }

        /* Center Content */
        .main-lobby {
            text-align: center;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(25px);
            padding: 60px 80px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 50px rgba(0,0,0,0.7);
        }

        h1 {
            font-size: 5rem;
            letter-spacing: 8px;
            background: linear-gradient(to right, #00f2fe, #4facfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
            margin-bottom: 5px;
        }

        .subtitle {
            color: #888;
            font-size: 1.1rem;
            letter-spacing: 2px;
            margin-bottom: 30px;
        }

        /* Get Started Button under SkyViper */
        .lobby-get-started {
            display: inline-block;
            padding: 15px 40px;
            background: #4facfe;
            color: white;
            text-decoration: none;
            font-weight: bold;
            border-radius: 30px;
            transition: 0.3s;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            box-shadow: 0 4px 15px rgba(79, 172, 254, 0.4);
        }

        .lobby-get-started:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(79, 172, 254, 0.6);
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            justify-content: center; align-items: center;
            z-index: 1000;
        }

        .modal-box {
            background: #161b22;
            padding: 40px;
            border-radius: 20px;
            width: 380px;
            border: 1px solid #30363d;
            position: relative;
        }

        input {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            background: #0d1117;
            border: 1px solid #30363d;
            color: white;
            border-radius: 10px;
            outline: none;
        }

        #error-msg {
            color: #ff4d4d;
            font-size: 13px;
            margin-top: 5px;
            display: none;
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background: #4facfe;
            border: none;
            color: white;
            font-weight: bold;
            border-radius: 10px;
            margin-top: 20px;
            cursor: pointer;
        }

        .close-x {
            position: absolute;
            top: 15px; right: 20px;
            color: #888; cursor: pointer; font-size: 20px;
        }
    </style>
</head>
<body>

    <div class="navbar">
        <button class="nav-btn" onclick="openModal()">Get Started</button>
    </div>

    <div class="main-lobby">
        <h1>SKY VIPER</h1>
        <p class="subtitle">All 2D Games In One Website</p>
        <button class="lobby-get-started" onclick="openModal()">Get Started</button>
    </div>

    <div id="authModal" class="modal">
        <div class="modal-box">
            <span class="close-x" onclick="closeModal()">&times;</span>
            <h2 style="margin-bottom: 20px; color: #4facfe;">Get Started</h2>
            
            <form id="authForm">
                <input type="email" id="email" placeholder="Email Address" required>
                <input type="password" id="password" placeholder="Password" required>
                
                <p id="error-msg">Please enter a valid email and password!</p>
                
                <button type="submit" class="submit-btn">Continue</button>
            </form>
        </div>
    </div>

    <script>
        const modal = document.getElementById('authModal');
        const errorMsg = document.getElementById('error-msg');
        const authForm = document.getElementById('authForm');

        function openModal() {
            modal.style.display = 'flex';
            errorMsg.style.display = 'none';
            authForm.reset();
        }

        function closeModal() {
            modal.style.display = 'none';
        }

        authForm.onsubmit = function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;

            // Fix: Ab koi bhi email aur password (min 3 chars) accept hoga
            if(email.includes('@') && pass.length >= 3) {
                alert("Login Successful! Redirecting to SkyViper...");
                closeModal();
            } else {
                errorMsg.style.display = 'block';
            }
        };

        window.onclick = (event) => { if (event.target == modal) closeModal(); }
    </script>

</body>
</html>
