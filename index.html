<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Void Aura</title>
    <style>
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: #000;
            color: #4a0000;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
        }

        /* Flashlight effect */
        #flashlight {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle 150px at center, transparent 10%, rgba(0, 0, 0, 0.98) 100%);
            pointer-events: none;
            z-index: 100;
        }

        #world {
            position: relative;
            width: 100%; height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.2s ease;
        }

        #game-content {
            text-align: center;
        }

        h1 { font-size: 4rem; letter-spacing: 15px; text-shadow: 0 0 10px #ff0000; }

        .btn-start {
            padding: 15px 30px;
            background: #111;
            border: 1px solid #4a0000;
            color: #8b0000;
            font-size: 1.2rem;
            cursor: pointer;
            position: relative;
            z-index: 1000;
        }

        #status {
            position: fixed;
            bottom: 20px; left: 20px;
            font-size: 0.9rem;
            color: #333;
        }
    </style>
</head>
<body>

    <div id="flashlight"></div>

    <div id="world">
        <div id="game-content">
            <h1>VOID AURA</h1>
            <p id="msg">Movement Sensors Active</p>
            <button class="btn-start" id="startBtn" onclick="this.style.display='none'">PLAY GAME</button>
        </div>
    </div>

    <div id="status">STATUS: STANDING</div>

    <script>
        const flashlight = document.getElementById('flashlight');
        const world = document.getElementById('world');
        const gameContent = document.getElementById('game-content');
        const statusText = document.getElementById('status');

        let posX = 0, posY = 0;
        let isCrouching = false;

        // Flashlight Logic
        document.addEventListener('mousemove', (e) => {
            flashlight.style.background = `radial-gradient(circle 180px at ${e.clientX}px ${e.clientY}px, transparent 10%, rgba(0, 0, 0, 0.98) 80%)`;
        });

        // Movement (W=Agey, S=Peeche, A=Left, D=Right)
        document.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            let moveStep = isCrouching ? 10 : 20;

            if (key === 'w') posY += moveStep;
            if (key === 's') posY -= moveStep;
            if (key === 'a') posX += moveStep;
            if (key === 'd') posX -= moveStep;

            if (key === 'c') {
                isCrouching = true;
                world.style.transform = "translateY(80px)";
                statusText.innerText = "STATUS: CROUCHED";
                console.log("Crouched");
            }

            gameContent.style.transform = `translate(${posX}px, ${posY}px)`;
        });

        document.addEventListener('keyup', (e) => {
            if (e.key.toLowerCase() === 'c') {
                isCrouching = false;
                world.style.transform = "translateY(0px)";
                statusText.innerText = "STATUS: STANDING";
            }
        });
    </script>
</body>
</html>
