<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VOID AURA - DEBUG VERSION</title>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; background: #111; }
        #ui { position: absolute; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: #000; color: #fff; z-index: 100; font-family: sans-serif; }
        #start { padding: 20px 60px; font-size: 24px; background: #f00; color: #fff; border: none; cursor: pointer; }
    </style>
</head>
<body>

<div id="ui">
    <h1 style="color:red">GHOST TEST MODE</h1>
    <p>Agar Ghost nazar na aaye toh Red Box ko dekhein</p>
    <button id="start">START GAME</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/controls/PointerLockControls.js"></script>
<script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/loaders/GLTFLoader.js"></script>

<script>
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x111111); // Thoda greyish taaki andhera na ho

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // --- TEZ LIGHTS ---
    const ambient = new THREE.AmbientLight(0xffffff, 2); 
    scene.add(ambient);
    const pointLight = new THREE.PointLight(0xffffff, 2);
    camera.add(pointLight); // Camera ke saath light attach kar di
    scene.add(camera);

    const controls = new THREE.PointerLockControls(camera, document.body);
    document.getElementById('start').onclick = () => controls.lock();
    controls.addEventListener('lock', () => document.getElementById('ui').style.display = 'none');

    // Ground for Reference
    const ground = new THREE.Mesh(
        new THREE.PlaneGeometry(100, 100), 
        new THREE.MeshStandardMaterial({ color: 0x333333, side: THREE.DoubleSide })
    );
    ground.rotation.x = Math.PI / 2;
    scene.add(ground);

    /* --- TEST RED CUBE (Agar ghost na dikhe toh ye dikhega) --- */
    const testBox = new THREE.Mesh(
        new THREE.BoxGeometry(1, 2, 1),
        new THREE.MeshStandardMaterial({ color: 0xff0000 })
    );
    testBox.position.set(0, 1, -5); // Bilkul samne
    scene.add(testBox);

    /* --- GHOST LOADING --- */
    let ghost = null, mixer = null;
    const clock = new THREE.Clock();
    const loader = new THREE.GLTFLoader();

    loader.load('./ghost_girl.glb', (gltf) => {
        console.log("Model loaded!");
        ghost = gltf.scene;
        ghost.scale.set(1.5, 1.5, 1.5);
        ghost.position.set(0, 0, -5); // Red box ki jagah
        scene.add(ghost);
        scene.remove(testBox); // Ghost aate hi dabba hata do

        mixer = new THREE.AnimationMixer(ghost);
        if (gltf.animations.length > 0) mixer.clipAction(gltf.animations[0]).play();
    }, undefined, (err) => {
        console.error("Model Error:", err);
    });

    const keys = {};
    document.onkeydown = (e) => keys[e.code] = true;
    document.onkeyup = (e) => keys[e.code] = false;

    camera.position.y = 1.7;

    function animate() {
        requestAnimationFrame(animate);
        const delta = clock.getDelta();
        if (mixer) mixer.update(delta);

        if (controls.isLocked) {
            let speed = 0.1;
            if (keys['KeyW']) controls.moveForward(speed);
            if (keys['KeyS']) controls.moveForward(-speed);
            if (keys['KeyA']) controls.moveRight(-speed);
            if (keys['KeyD']) controls.moveRight(speed);
        }
        renderer.render(scene, camera);
    }
    animate();
</script>
</body>
</html>
