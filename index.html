```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VOID AURA</title>

<style>
body,html{margin:0;padding:0;overflow:hidden;background:#000;font-family:sans-serif;}

#ui{
position:absolute;width:100%;height:100%;
display:flex;flex-direction:column;justify-content:center;align-items:center;
background:#000;color:#fff;z-index:10;
}

#start{
padding:18px 60px;
font-size:20px;
background:#4CAF50;
border:none;
border-radius:10px;
cursor:pointer;
}

#crosshair{
position:absolute;top:50%;left:50%;
width:14px;height:14px;
transform:translate(-50%,-50%);
z-index:5;
pointer-events:none;
}
#crosshair::before,#crosshair::after{
content:'';position:absolute;background:#fff;
}
#crosshair::before{width:100%;height:2px;top:50%;}
#crosshair::after{height:100%;width:2px;left:50%;}

#stamina{
position:fixed;bottom:40px;left:50%;
transform:translateX(-50%);
width:220px;height:8px;
background:#111;border:1px solid #444;
}
#fill{height:100%;width:100%;background:#4CAF50;}
</style>
</head>

<body>

<div id="ui">
<h1 style="color:#4CAF50;">VOID AURA</h1>
<button id="start">PLAY</button>
</div>

<div id="crosshair"></div>
<div id="stamina"><div id="fill"></div></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/controls/PointerLockControls.js"></script>

<script>

const scene=new THREE.Scene();
scene.background=new THREE.Color(0x111111);

const camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff,0.8));
const light=new THREE.DirectionalLight(0xffffff,1);
light.position.set(20,40,20);
scene.add(light);

const player=new THREE.Group();
player.position.set(40,1.7,40);
scene.add(player);
player.add(camera);

const controls=new THREE.PointerLockControls(camera,document.body);

document.getElementById('start').onclick=()=>controls.lock();

controls.addEventListener('lock',()=>{
document.getElementById('ui').style.display='none';
});

const ground=new THREE.Mesh(
new THREE.PlaneGeometry(200,200),
new THREE.MeshStandardMaterial({color:0x228B22})
);
ground.rotation.x=-Math.PI/2;
scene.add(ground);

/* RED BORDER WALL (STRONG COLLISION) */
function wall(x,z,w,d){
const m=new THREE.Mesh(
new THREE.BoxGeometry(w,3,d),
new THREE.MeshStandardMaterial({color:0xff0000})
);
m.position.set(x,1.5,z);
scene.add(m);
}
wall(50,-1,100,1);
wall(50,100,100,1);
wall(-1,50,1,100);
wall(100,50,1,100);

/* POTATO (DIRTY TEXTURE LOOK) */
const potatoGeo=new THREE.SphereGeometry(1.5,32,32);
const potatoMat=new THREE.MeshStandardMaterial({
color:0x8B5A2B,
roughness:1,
metalness:0
});
const potato=new THREE.Mesh(potatoGeo,potatoMat);
potato.position.set(10,2.2,10);
scene.add(potato);

let keys={};
onkeydown=e=>keys[e.code]=true;
onkeyup=e=>keys[e.code]=false;

/* STATS */
let stamina=100;
let velocityY=0;
let canJump=true;
let dead=false;

function animate(){
requestAnimationFrame(animate);

if(controls.isLocked && !dead){

/* SPEED */
let sprint = keys['ShiftLeft'] && stamina>0;
let speed = sprint ? 0.3 : 0.15;

/* STAMINA (≈12 SEC FULL REGEN) */
if(sprint && (keys['KeyW']||keys['KeyA']||keys['KeyS']||keys['KeyD'])){
stamina -= 0.6;
}else{
stamina += 0.15; // slow regen FIX
}
stamina=Math.max(0,Math.min(100,stamina));
document.getElementById('fill').style.width=stamina+"%";

/* MOVE */
let oldX=player.position.x;
let oldZ=player.position.z;

if(keys['KeyW']) controls.moveForward(speed);
if(keys['KeyS']) controls.moveForward(-speed);
if(keys['KeyA']) controls.moveRight(-speed);
if(keys['KeyD']) controls.moveRight(speed);

/* HARD BORDER COLLISION */
if(player.position.x<2||player.position.x>98) player.position.x=oldX;
if(player.position.z<2||player.position.z>98) player.position.z=oldZ;

/* JUMP */
if(keys['Space'] && canJump){
velocityY=0.22;
canJump=false;
}
player.position.y += velocityY;
velocityY -= 0.01;

if(player.position.y<=1.7){
player.position.y=1.7;
velocityY=0;
canJump=true;
}

/* POTATO FOLLOW AI */
let playerPos=new THREE.Vector3();
controls.getObject().getWorldPosition(playerPos);

let dir=new THREE.Vector3().subVectors(playerPos,potato.position);
dir.y=0;
dir.normalize();

let dist=potato.position.distanceTo(playerPos);
let speedAI=dist>8?0.25:0.18;

potato.position.add(dir.multiplyScalar(speedAI));

potato.lookAt(playerPos);

/* COLLISION */
if(dist<1.4){
dead=true;
controls.unlock();
document.getElementById('ui').style.display='flex';
document.getElementById('ui').innerHTML="<h1 style='color:red'>MASHED!</h1><button onclick='location.reload()'>RETRY</button>";
}

}

renderer.render(scene,camera);
}
animate();

</script>

</body>
</html>
