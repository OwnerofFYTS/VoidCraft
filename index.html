<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FPS Game</title>
<style>
    body { margin: 0; overflow: hidden; background: black; }
    #game-wrapper { width: 100vw; height: 100vh; }

    #ui-layer {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
        background: rgba(0,0,0,0.8);
        color: white;
    }

    #reticle {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        color: white;
        font-size: 24px;
        display: none;
    }
</style>
</head>

<body>

<div id="game-wrapper"></div>

<div id="ui-layer">
    <button id="play-button">Play</button>
</div>

<div id="reticle">+</div>

<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.158/build/three.module.js';
import { PointerLockControls } from 'https://cdn.jsdelivr.net/npm/three@0.158/examples/jsm/controls/PointerLockControls.js';

const wrapper = document.getElementById('game-wrapper');
const uiLayer = document.getElementById('ui-layer');
const playBtn = document.getElementById('play-button');
const reticle = document.getElementById('reticle');

// Scene
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x050505);
scene.fog = new THREE.Fog(0x050505, 1, 60);

// Camera
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);

// Renderer
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
wrapper.appendChild(renderer.domElement);

// Light
scene.add(new THREE.AmbientLight(0xffffff, 0.5));
scene.add(camera);

// Grid
scene.add(new THREE.GridHelper(200, 60));

// Gun
const gun = new THREE.Mesh(
    new THREE.BoxGeometry(0.15, 0.2, 0.7),
    new THREE.MeshStandardMaterial({ color: 0x333333 })
);
gun.position.set(0.4, -0.3, -0.6);
camera.add(gun);

// Targets
const targets = [];
for(let i=0;i<15;i++){
    const t = new THREE.Mesh(
        new THREE.BoxGeometry(1.5,3,1.5),
        new THREE.MeshStandardMaterial({ color: 0xff0000 })
    );
    t.position.set(Math.random()*80-40,1.5,Math.random()*80-40);
    scene.add(t);
    targets.push(t);
}

// Controls
const controls = new PointerLockControls(camera, document.body);

playBtn.onclick = () => controls.lock();

controls.addEventListener('lock', ()=>{
    uiLayer.style.display='none';
    reticle.style.display='block';
});

controls.addEventListener('unlock', ()=>{
    uiLayer.style.display='flex';
    reticle.style.display='none';
});

// Movement
let moveF=false, moveB=false, moveL=false, moveR=false;
let canJump=false, isCrouch=false;

const velocity = new THREE.Vector3();
const direction = new THREE.Vector3();

document.addEventListener('keydown', e=>{
    if(e.code==='KeyW') moveF=true;
    if(e.code==='KeyS') moveB=true;
    if(e.code==='KeyA') moveL=true;
    if(e.code==='KeyD') moveR=true;

    if(e.code==='Space' && canJump){
        velocity.y += 10;
        canJump=false;
    }

    if(e.code==='ShiftLeft') isCrouch=true;
});

document.addEventListener('keyup', e=>{
    if(e.code==='KeyW') moveF=false;
    if(e.code==='KeyS') moveB=false;
    if(e.code==='KeyA') moveL=false;
    if(e.code==='KeyD') moveR=false;

    if(e.code==='ShiftLeft') isCrouch=false;
});

// Shooting
window.addEventListener('mousedown', ()=>{
    if(!controls.isLocked) return;

    gun.position.z+=0.1;
    setTimeout(()=>gun.position.z-=0.1,50);

    const ray = new THREE.Raycaster();
    ray.setFromCamera(new THREE.Vector2(0,0), camera);

    const hit = ray.intersectObjects(targets);
    if(hit.length>0) hit[0].object.position.y=-10;
});

// Animation
let prev = performance.now();

function animate(){
    requestAnimationFrame(animate);

    const time = performance.now();
    const delta = (time-prev)/1000;

    if(controls.isLocked){
        const speed = isCrouch ? 120 : 180;

        velocity.x -= velocity.x*10*delta;
        velocity.z -= velocity.z*10*delta;
        velocity.y -= 9.8*4*delta;

        direction.z = Number(moveF)-Number(moveB);
        direction.x = Number(moveR)-Number(moveL);
        direction.normalize();

        if(moveF||moveB) velocity.z -= direction.z*speed*delta;
        if(moveL||moveR) velocity.x -= direction.x*speed*delta;

        controls.moveRight(-velocity.x*delta);
        controls.moveForward(-velocity.z*delta);

        let targetH = isCrouch ? 1.0 : 1.7;
        camera.position.y += (targetH - camera.position.y)*10*delta;

        if(camera.position.y < targetH+0.05){
            velocity.y=0;
            camera.position.y=targetH;
            canJump=true;
        }
    }

    prev=time;
    renderer.render(scene,camera);
}

animate();

// Resize
window.onresize=()=>{
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth,window.innerHeight);
};
</script>

</body>
</html>
