<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoidCraft | Enter the Void</title>
    <style>
        /* DESIGN BILKUL WAISA HI HAI */
        body {
            margin: 0; padding: 0;
            background: radial-gradient(circle at center, #0a192f 0%, #020c1b 100%);
            color: #e6f1ff; font-family: 'Inter', sans-serif;
            height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        nav { display: flex; justify-content: flex-end; padding: 25px 60px; gap: 20px; align-items: center; z-index: 10; }
        .login-btn { color: #8892b0; background: none; border: none; font-size: 15px; font-weight: 500; cursor: pointer; }
        .signup-btn { background-color: transparent; color: #64ffda; border: 1px solid #64ffda; padding: 10px 22px; border-radius: 4px; cursor: pointer; font-size: 14px; font-weight: 600; }
        
        .hero { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding-bottom: 80px; }
        h1 { font-size: clamp(50px, 12vw, 100px); margin: 0; font-weight: 800; color: #ccd6f6; letter-spacing: -2px; }
        .sub-text { color: #8892b0; font-size: 18px; margin-top: 5px; letter-spacing: 4px; text-transform: uppercase; }
        .get-started { margin-top: 65px; padding: 20px 65px; font-size: 18px; font-weight: 700; color: #0a192f; background-color: #64ffda; border: none; border-radius: 5px; cursor: pointer; }

        /* AUTH MODAL */
        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(2, 12, 27, 0.9); backdrop-filter: blur(8px); }
        .modal-content { background-color: #112240; margin: 8% auto; padding: 30px; border-radius: 16px; width: 350px; text-align: center; border: 1px solid #233554; }
        .modal-content h2 { color: #64ffda; margin-bottom: 20px; }
        
        input { width: 100%; padding: 12px; margin: 8px 0; background: #0a192f; border: 1px solid #233554; color: white; border-radius: 6px; box-sizing: border-box; }
        .submit-btn { width: 100%; padding: 12px; background: #64ffda; color: #0a192f; border: none; border-radius: 6px; font-weight: bold; margin-top: 15px; cursor: pointer; }
        .close-btn { color: #8892b0; float: right; font-size: 28px; cursor: pointer; margin-top: -15px; }
        
        .switch-text { color: #8892b0; font-size: 13px; margin-top: 15px; cursor: pointer; display: block; }
        .switch-text span { color: #64ffda; text-decoration: underline; }

        /* GAME OVERLAY */
        #game-container { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; }
        #game-menu { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; z-index: 1001; }
        .mode-btn { display: block; width: 250px; padding: 20px; margin: 15px; background: #112240; color: #64ffda; border: 2px solid #64ffda; border-radius: 8px; font-size: 20px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        iframe { width: 100%; height: 100%; border: none; display: none; }
    </style>
</head>
<body>

    <nav id="main-nav">
        <button class="login-btn" onclick="openAuth('login')">Login</button>
        <button class="signup-btn" onclick="openAuth('signup')">Sign Up</button>
    </nav>

    <div class="hero" id="main-hero">
        <h1>VoidCraft</h1>
        <p class="sub-text">Beyond the horizon</p>
        <button class="get-started" onclick="checkAuth()">Get Started</button>
    </div>

    <div id="authModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <h2 id="modalTitle">Sign Up</h2>
            <div id="signup-fields">
                <input type="text" placeholder="First Name">
                <input type="text" placeholder="Last Name">
            </div>
            <input type="email" placeholder="Email Address">
            <input type="password" placeholder="Password">
            <button class="submit-btn" onclick="startTheGame()">Continue</button>
            <p class="switch-text" id="switchLink" onclick="toggleAuth()">Already have an account? <span>Login</span></p>
        </div>
    </div>

    <div id="game-container">
        <div id="game-menu">
            <h2 style="color: white; margin-bottom: 30px; font-size: 32px;">SELECT GAME MODE</h2>
            <button class="mode-btn" onclick="launchPixelGame('survival')">Survival</button>
            <button class="mode-btn" onclick="launchPixelGame('towers')">Lucky Towers</button>
            <p style="color: #8892b0; margin-top: 20px; cursor:pointer;" onclick="location.reload()">← Back to Home</p>
        </div>
        <iframe id="game-frame" src=""></iframe>
    </div>

    <script>
        const modal = document.getElementById("authModal");
        const title = document.getElementById("modalTitle");
        const signupFields = document.getElementById("signup-fields");
        const switchLink = document.getElementById("switchLink");

        let isUserLoggedIn = false; // Initial state

        function openAuth(type) {
            modal.style.display = "block";
            if(type === 'login') {
                title.innerText = "Login";
                signupFields.style.display = "none";
                switchLink.innerHTML = "Don't have an account? <span>Sign Up</span>";
            } else {
                title.innerText = "Sign Up";
                signupFields.style.display = "block";
                switchLink.innerHTML = "Already have an account? <span>Login</span>";
            }
        }

        function toggleAuth() {
            if(title.innerText === "Sign Up") {
                openAuth('login');
            } else {
                openAuth('signup');
            }
        }

        function closeModal() { modal.style.display = "none"; }

        function checkAuth() {
            if(!isUserLoggedIn) {
                openAuth('signup'); // Signup pehle khulega
            } else {
                startTheGame();
            }
        }

        function startTheGame() {
            isUserLoggedIn = true; // State change
            closeModal();
            document.getElementById('main-nav').style.display = 'none';
            document.getElementById('main-hero').style.display = 'none';
            document.getElementById('game-container').style.display = 'block';
        }

        function launchPixelGame(mode) {
            const frame = document.getElementById('game-frame');
            document.getElementById('game-menu').style.display = 'none';
            frame.style.display = 'block';
            frame.src = mode === 'survival' ? "https://bloxd.io/?mode=survival" : "https://bloxd.io/?mode=oneblock";
        }

        window.onclick = function(event) { if (event.target == modal) closeModal(); }
    </script>
</body>
</html>
