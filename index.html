<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cubex | Next Gen Gaming</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0d1117; /* Solid Dark Theme */
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Top Right Navigation */
        nav {
            display: flex;
            justify-content: flex-end;
            padding: 25px 40px;
            gap: 25px;
            align-items: center;
        }

        .nav-link {
            color: #8b949e;
            text-decoration: none;
            font-size: 15px;
            transition: 0.3s;
        }

        .nav-link:hover {
            color: #58a6ff;
        }

        .signin-btn {
            background-color: #21262d;
            color: #c9d1d9;
            padding: 8px 18px;
            border: 1px solid #30363d;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 500;
        }

        .signin-btn:hover {
            background-color: #30363d;
        }

        /* Center Content */
        .hero {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        h1 {
            font-size: 70px;
            margin: 0;
            background: linear-gradient(to bottom, #fff, #8b949e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -2px;
        }

        .get-started {
            margin-top: 40px;
            padding: 16px 45px;
            font-size: 20px;
            font-weight: bold;
            background-color: #238636; /* GitHub Green */
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 14px rgba(35, 134, 54, 0.4);
            transition: 0.2s ease;
        }

        .get-started:hover {
            transform: translateY(-2px);
            background-color: #2ea043;
        }
    </style>
</head>
<body>

    <nav>
        <a href="mailto:your-email@example.com" class="nav-link">Email Us</a>
        <a href="#" class="signin-btn">Sign In</a>
    </nav>

    <div class="hero">
        <h1>Cubex.io</h1>
        <button class="get-started">Get Started</button>
    </div>

</body>
</html>
