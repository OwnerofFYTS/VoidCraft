<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoidCraft | Enter the Void</title>
    <style>
        body { margin: 0; padding: 0; background: radial-gradient(circle at center, #0a192f 0%, #020c1b 100%); color: #e6f1ff; font-family: 'Inter', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        nav { display: flex; justify-content: flex-end; padding: 25px 60px; gap: 20px; align-items: center; z-index: 10; }
        .login-btn { color: #8892b0; background: none; border: none; font-size: 15px; font-weight: 500; cursor: pointer; }
        .signup-btn { background-color: transparent; color: #64ffda; border: 1px solid #64ffda; padding: 10px 22px; border-radius: 4px; cursor: pointer; font-size: 14px; font-weight: 600; }
        .hero { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding-bottom: 80px; }
        h1 { font-size: clamp(50px, 12vw, 100px); margin: 0; font-weight: 800; color: #ccd6f6; letter-spacing: -2px; }
        .sub-text { color: #8892b0; font-size: 18px; margin-top: 5px; letter-spacing: 4px; text-transform: uppercase; }
        .get-started { margin-top: 65px; padding: 20px 65px; font-size: 18px; font-weight: 700; color: #0a192f; background-color: #64ffda; border: none; border-radius: 5px; cursor: pointer; }

        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(2, 12, 27, 0.9); backdrop-filter: blur(8px); }
        .modal-content { background-color: #112240; margin: 8% auto; padding: 30px; border-radius: 16px; width: 350px; text-align: center; border: 1px solid #233554; }
        input { width: 100%; padding: 12px; margin: 8px 0; background: #0a192f; border: 1px solid #233554; color: white; border-radius: 6px; box-sizing: border-box; }
        .submit-btn { width: 100%; padding: 12px; background: #64ffda; color: #0a192f; border: none; border-radius: 6px; font-weight: bold; margin-top: 15px; cursor: pointer; }

        #game-view { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1000; }
        #crosshair { position: fixed; top: 50%; left: 50%; width: 20px; height: 20px; transform: translate(-50%, -50%); pointer-events: none; z-index: 1010; }
        #crosshair:before { content: ''; position: absolute; top: 0; left: 9px; width: 2px; height: 20px; background: #64ffda; }
        #crosshair:after { content: ''; position: absolute; top: 9px; left: 0; width: 20px; height: 2px; background: #64ffda; }
        #hotbar { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(10, 25, 47, 0.9); border: 2px solid #64ffda; padding: 10px 30px; border-radius: 8px; z-index: 1010; color: white; font-family: monospace; font-size: 18px; }
    </style>
</head>
<body>

    <nav id="top-nav">
        <button class="login-btn" onclick="openAuth()">Login</button>
        <button class="signup-btn" onclick="openAuth()">Sign Up</button>
    </nav>

    <div class="hero" id="home-hero">
        <h1>VoidCraft</h1>
        <p class="sub-text">Beyond the horizon</p>
        <button class="get-started" onclick="initGameFlow()">Get Started</button>
    </div>

    <div id="authModal" class="modal">
        <div class="modal-content">
            <h2 id="modalTitle">Sign Up</h2>
            <input type="text" placeholder="First Name">
            <input type="text" placeholder="Last Name">
            <input type="email" placeholder="Email Address">
            <input type="password" placeholder="Password">
            <button class="submit-btn" onclick="launchGame()">Start Playing</button>
        </div>
    </div>

    <div id="game-view">
        <div id="crosshair"></div>
        <div id="hotbar">ITEM: <span id="item-slot">WAITING...</span></div>
        <canvas id="void-canvas"></canvas>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        const modal = document.getElementById('authModal');
        let loggedIn = false;

        function openAuth() { modal.style.display = 'block'; }
        function initGameFlow() { if(!loggedIn) openAuth(); else launchGame(); }

        function launchGame() {
            loggedIn = true;
            modal.style.display = 'none';
            document.getElementById('top-nav').style.display = 'none';
            document.getElementById('home-hero').style.display = 'none';
            document.getElementById('game-view').style.display = 'block';
            startVoidEngine();
        }

        function startVoidEngine() {
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x020c1b);
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            const canvas = document.getElementById('void-canvas');
            const renderer = new THREE.WebGLRenderer({canvas: canvas, antialias: true});
            renderer.setSize(window.innerWidth, window.innerHeight);

            // World setup
            const lava = new THREE.Mesh(new THREE.PlaneGeometry(1000, 1000), new THREE.MeshBasicMaterial({color: 0xff4400}));
            lava.rotation.x = -Math.PI / 2;
            lava.position.y = -30;
            scene.add(lava);

            for(let i=0; i<8; i++) {
                const tower = new THREE.Mesh(new THREE.BoxGeometry(10, 1, 10), new THREE.MeshStandardMaterial({color: 0x444d56}));
                const angle = (i / 8) * Math.PI * 2;
                tower.position.set(Math.cos(angle) * 30, 0, Math.sin(angle) * 30);
                scene.add(tower);
            }

            scene.add(new THREE.AmbientLight(0xffffff, 0.6));
            camera.position.set(30, 3, 30);

            // Controls setup
            const keys = {};
            let velocityY = 0;
            const gravity = -0.008;
            const jumpStrength = 0.18;
            let onGround = true;

            window.addEventListener('keydown', (e) => keys[e.code] = true);
            window.addEventListener('keyup', (e) => keys[e.code] = false);
            canvas.addEventListener('click', () => canvas.requestPointerLock());

            let pitch = 0, yaw = 0;
            window.addEventListener('mousemove', (e) => {
                if (document.pointerLockElement === canvas) {
                    yaw -= e.movementX * 0.002;
                    pitch -= e.movementY * 0.002;
                    pitch = Math.max(-Math.PI/2, Math.min(Math.PI/2, pitch));
                }
            });

            setInterval(() => {
                const items = ["DIAMOND BLOCK", "TNT", "ENDER PEARL", "IRON SWORD"];
                document.getElementById('item-slot').innerText = items[Math.floor(Math.random()*items.length)];
            }, 5000);

            function animate() {
                requestAnimationFrame(animate);
                
                if (document.pointerLockElement === canvas) {
                    let currentSpeed = 0.15;
                    if (keys['ControlLeft']) currentSpeed = 0.25; 
                    if (keys['ShiftLeft']) currentSpeed = 0.06;

                    // Forward/Backward
                    if(keys['KeyW']) {
                        camera.position.x -= Math.sin(yaw) * currentSpeed;
                        camera.position.z -= Math.cos(yaw) * currentSpeed;
                    }
                    if(keys['KeyS']) {
                        camera.position.x += Math.sin(yaw) * currentSpeed;
                        camera.position.z += Math.cos(yaw) * currentSpeed;
                    }
                    // Strafe Left/Right
                    if(keys['KeyA']) {
                        camera.position.x -= Math.sin(yaw + Math.PI/2) * currentSpeed;
                        camera.position.z -= Math.cos(yaw + Math.PI/2) * currentSpeed;
                    }
                    if(keys['KeyD']) {
                        camera.position.x += Math.sin(yaw + Math.PI/2) * currentSpeed;
                        camera.position.z += Math.cos(yaw + Math.PI/2) * currentSpeed;
                    }

                    // Jump Logic
                    if(keys['Space'] && onGround) {
                        velocityY = jumpStrength;
                        onGround = false;
                    }
                }

                // Physics
                velocityY += gravity;
                camera.position.y += velocityY;

                // Base height (Minecraft Style)
                let floorHeight = 3;
                if (keys['ShiftLeft']) floorHeight = 2.2; // Crouch height

                if (camera.position.y <= floorHeight) {
                    camera.position.y = floorHeight;
                    velocityY = 0;
                    onGround = true;
                }

                camera.rotation.set(pitch, yaw, 0, 'YXZ');
                
                if(camera.position.y < -28) { 
                    camera.position.set(30, 3, 30); 
                    velocityY = 0;
                }
                renderer.render(scene, camera);
            }
            animate();
        }
    </script>
</body>
</html>
