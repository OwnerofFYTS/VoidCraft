<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>3D Horror Game - SkyViper</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Courier New', monospace; }
        #ui { position: absolute; top: 20px; left: 20px; color: white; z-index: 100; pointer-events: none; }
        #stamina-box { width: 200px; height: 10px; border: 1px solid #444; background: #222; }
        #stamina-bar { width: 100%; height: 100%; background: #0f0; }
        #instructions { position: absolute; bottom: 20px; width: 100%; text-align: center; color: #555; }
    </style>
</head>
<body>

    <div id="ui">
        <div id="stamina-box"><div id="stamina-bar"></div></div>
        <div id="msg">STAMINA</div>
    </div>
    <div id="instructions">CLICK TO LOCK MOUSE | WASD: Move | Shift: Sprint | C: Crouch | Space: Jump</div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // 1. SCENE & CAMERA SETUP
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000000);
        scene.fog = new THREE.Fog(0x000000, 1, 15); // Horror Fog effect

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 2. LIGHTING (Flashlight effect)
        const flashLight = new THREE.SpotLight(0xffffff, 50);
        flashLight.angle = Math.PI / 6;
        flashLight.penumbra = 0.3;
        flashLight.decay = 2;
        flashLight.distance = 20;
        scene.add(flashLight);
        scene.add(flashLight.target);

        // 3. BLACK GROUND (Zameen)
        const grid = new THREE.GridHelper(100, 50, 0x222222, 0x111111);
        scene.add(grid); 
        const floorGeo = new THREE.PlaneGeometry(200, 200);
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x050505 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        // 4. 3D PLAYER (Capsule representing Churail/Character)
        const playerGeo = new THREE.CapsuleGeometry(0.5, 1, 4, 8);
        const playerMat = new THREE.MeshStandardMaterial({ color: 0x220000 });
        const player = new THREE.Mesh(playerGeo, playerMat);
        player.position.y = 1;
        scene.add(player);

        // 5. MOVEMENT LOGIC
        let stamina = 100;
        let isJumping = false;
        let yVelocity = 0;
        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
        let isCrouching = false, isSprinting = false;

        document.addEventListener('keydown', (e) => {
            if(e.code === 'KeyW') moveForward = true;
            if(e.code === 'KeyS') moveBackward = true;
            if(e.code === 'KeyA') moveLeft = true;
            if(e.code === 'KeyD') moveRight = true;
            if(e.code === 'ShiftLeft') isSprinting = true;
            if(e.code === 'KeyC') isCrouching = true;
            if(e.code === 'Space' && !isJumping) { isJumping = true; yVelocity = 0.15; }
        });

        document.addEventListener('keyup', (e) => {
            if(e.code === 'KeyW') moveForward = false;
            if(e.code === 'KeyS') moveBackward = false;
            if(e.code === 'KeyA') moveLeft = false;
            if(e.code === 'KeyD') moveRight = false;
            if(e.code === 'ShiftLeft') isSprinting = false;
            if(e.code === 'KeyC') isCrouching = false;
        });

        // Mouse Lock for 3D Look
        document.body.addEventListener('click', () => {
            document.body.requestPointerLock();
        });

        let yaw = 0, pitch = 0;
        document.addEventListener('mousemove', (e) => {
            if (document.pointerLockElement === document.body) {
                yaw -= e.movementX * 0.002;
                pitch -= e.movementY * 0.002;
                pitch = Math.max(-Math.PI/2.5, Math.min(Math.PI/2.5, pitch));
            }
        });

        function animate() {
            requestAnimationFrame(animate);

            // Movement Calculation
            let speed = isCrouching ? 0.05 : (isSprinting && stamina > 0 ? 0.15 : 0.08);
            
            // Stamina Management
            const bar = document.getElementById('stamina-bar');
            if (isSprinting && (moveForward || moveBackward) && stamina > 0) {
                stamina -= 0.6;
            } else if (stamina < 100) {
                stamina += 0.3;
            }
            bar.style.width = stamina + "%";
            bar.style.backgroundColor = stamina < 25 ? "red" : "#0f0";

            if (moveForward) {
                player.position.x += Math.sin(yaw) * speed;
                player.position.z += Math.cos(yaw) * speed;
            }
            if (moveBackward) {
                player.position.x -= Math.sin(yaw) * speed;
                player.position.z -= Math.cos(yaw) * speed;
            }

            // Jump Gravity
            if (isJumping) {
                player.position.y += yVelocity;
                yVelocity -= 0.008;
                if (player.position.y <= 1) {
                    player.position.y = 1;
                    isJumping = false;
                }
            }

            // Crouch height
            player.scale.y = isCrouching ? 0.6 : 1;

            // Camera follow & rotation
            camera.rotation.order = "YXZ";
            camera.rotation.set(pitch, yaw, 0);
            camera.position.set(player.position.x, player.position.y + 0.8, player.position.z);

            // Flashlight follow camera
            flashLight.position.copy(camera.position);
            const targetPos = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion).add(camera.position);
            flashLight.target.position.copy(targetPos);

            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
