<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOID AURA | HORROR PROTOCOL</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; color: #fff; font-family: 'Courier New', Courier, monospace; }
        #game-wrapper { position: relative; width: 100%; height: 100vh; }
        
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #1a0000 0%, #000 100%);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 1000; transition: opacity 0.8s;
        }

        h1 { font-size: 4rem; letter-spacing: 12px; margin: 0; color: #fff; text-shadow: 0 0 20px #f00; }
        #play-button { padding: 15px 60px; background: transparent; border: 2px solid #ff3e3e; color: #ff3e3e; font-size: 1.2rem; cursor: pointer; letter-spacing: 5px; font-weight: bold; margin-top: 20px;}

        #stamina-container {
            position: fixed; bottom: 50px; left: 50%; transform: translateX(-50%);
            width: 250px; height: 15px; border: 2px solid #600; background: rgba(0,0,0,0.9);
            display: none; z-index: 9999;
        }
        #stamina-bar { width: 100%; height: 100%; background: #ff0000; box-shadow: 0 0 10px #f00; }

        #reticle { position: absolute; top: 50%; left: 50%; width: 6px; height: 6px; background: red; border-radius: 50%; transform: translate(-50%, -50%); display: none; z-index: 500; }

        #game-over { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(40, 0, 0, 0.95); display: none; z-index: 2000; flex-direction: column; justify-content: center; align-items: center; }
    </style>
</head>
<body>

<div id="game-wrapper">
    <div id="ui-layer">
        <h1>VOID AURA</h1>
        <button id="play-button">PLAY</button>
    </div>
    <div id="stamina-container"><div id="stamina-bar"></div></div>
    <div id="game-over">
        <h1 style="color: #f00;">GAME OVER</h1>
        <button onclick="location.reload()" style="background:none; border:1px solid #fff; color:#fff; padding:10px 20px; cursor:pointer;">RESTART</button>
    </div>
    <div id="reticle"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/controls/PointerLockControls.js"></script>

<script>
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x020202);
    scene.fog = new THREE.Fog(0x020202, 1, 45);

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.getElementById('game-wrapper').appendChild(renderer.domElement);

    const player = new THREE.Group();
    player.position.set(0, 1.7, 0);
    scene.add(player);
    player.add(camera);

    scene.add(new THREE.AmbientLight(0xffffff, 0.1));
    const flashlight = new THREE.SpotLight(0xffffff, 2.5, 40, Math.PI/4, 0.3);
    camera.add(flashlight);
    flashlight.target.position.set(0, 0, -1);
    camera.add(flashlight.target);

    const grid = new THREE.GridHelper(300, 100, 0x440000, 0x111111);
    scene.add(grid);

    const stalker = new THREE.Mesh(
        new THREE.BoxGeometry(1.5, 3.5, 1.5),
        new THREE.MeshBasicMaterial({ color: 0xff0000 })
    );
    stalker.position.set(0, 1.75, 35);
    scene.add(stalker);

    const controls = new THREE.PointerLockControls(camera, document.body);
    const playBtn = document.getElementById('play-button');
    
    playBtn.onclick = () => controls.lock();
    controls.addEventListener('lock', () => { 
        document.getElementById('ui-layer').style.display = 'none';
        document.getElementById('stamina-container').style.display = 'block';
        document.getElementById('reticle').style.display = 'block';
    });

    let moveF = false, moveB = false, moveL = false, moveR = false, isCrouching = false, canJump = false, isRunning = false;
    let velocity = new THREE.Vector3();
    let stamina = 100;
    let headbobTimer = 0;

    document.onkeydown = (e) => {
        if(e.code === 'KeyW') moveF = true;
        if(e.code === 'KeyS') moveB = true;
        if(e.code === 'KeyA') moveL = true;
        if(e.code === 'KeyD') moveR = true;
        if(e.code === 'Space' && canJump) { velocity.y = 8; canJump = false; }
        if(e.code === 'ShiftLeft') isCrouching = true;
        if(e.code === 'ControlLeft') isRunning = true;
    };
    document.onkeyup = (e) => {
        if(e.code === 'KeyW') moveF = false;
        if(e.code === 'KeyS') moveB = false;
        if(e.code === 'KeyA') moveL = false;
        if(e.code === 'KeyD') moveR = false;
        if(e.code === 'ShiftLeft') isCrouching = false;
        if(e.code === 'ControlLeft') isRunning = false;
    };

    let lastTime = performance.now();
    function animate() {
        requestAnimationFrame(animate);
        const time = performance.now();
        const delta = (time - lastTime) / 1000;

        if (controls.isLocked) {
            const isMoving = (moveF || moveB || moveL || moveR);
            
            let currentSpeed = 25.0;
            let targetFOV = 75;

            if (isRunning && isMoving && stamina > 0) {
                stamina -= 20 * delta;
                currentSpeed = 38.0; 
                targetFOV = 92; 
                headbobTimer += delta * 15;
                camera.position.y = Math.sin(headbobTimer) * 0.12; 
                camera.position.x = Math.cos(headbobTimer * 0.5) * 0.05;
            } else {
                if (stamina < 100) stamina += 15 * delta;
                isRunning = false;
                if (isMoving) {
                    headbobTimer += delta * 8;
                    camera.position.y = Math.sin(headbobTimer) * 0.03;
                } else {
                    camera.position.y *= 0.9;
                }
                camera.position.x *= 0.9;
            }
            document.getElementById('stamina-bar').style.width = stamina + "%";
            camera.fov += (targetFOV - camera.fov) * 0.1;
            camera.updateProjectionMatrix();

            if (isCrouching) currentSpeed *= 0.5;

            velocity.x -= velocity.x * 10 * delta;
            velocity.z -= velocity.z * 10 * delta;
            velocity.y -= 22 * delta;

            if (moveF) velocity.z -= currentSpeed * delta;
            if (moveB) velocity.z += currentSpeed * delta;
            if (moveL) velocity.x -= currentSpeed * delta;
            if (moveR) velocity.x += currentSpeed * delta;

            controls.moveRight(velocity.x * delta);
            controls.moveForward(-velocity.z * delta);

            let tH = isCrouching ? 0.8 : 1.7;
            player.position.y += (tH - player.position.y) * 0.1 + velocity.y * delta;
            if (player.position.y < tH) { velocity.y = 0; player.position.y = tH; canJump = true; }

            // Stalker AI
            const dir = new THREE.Vector3().subVectors(player.position, stalker.position);
            dir.y = 0; dir.normalize();
            stalker.position.x += dir.x * (25.5 * 0.13) * delta; 
            stalker.position.z += dir.z * (25.5 * 0.13) * delta;
            stalker.lookAt(player.position.x, 1.75, player.position.z);

            // FINAL HITBOX FIX: 0.3 distance (Extreme Close)
            // Ab dushman ko bilkul player ke andar ghusna parega pakarne ke liye.
            if(player.position.distanceTo(stalker.position) < 0.3) {
                document.getElementById('game-over').style.display = 'flex';
                controls.unlock();
            }
        }
        lastTime = time;
        renderer.render(scene, camera);
    }
    animate();

    window.onresize = () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    };
</script>
</body>
</html>
