<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOID AURA - ADVANCED MOVEMENT</title>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; background: #000; font-family: 'Courier New', Courier, monospace; }
        #ui { position: absolute; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: #000; color: #fff; z-index: 20; text-align: center; }
        #start { padding: 20px 60px; font-size: 24px; background: #800; color: white; border: 2px solid #f00; cursor: pointer; font-weight: bold; }
        
        /* Stamina Bar UI */
        #stamina-container { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: 250px; height: 12px; background: #222; border: 2px solid #444; border-radius: 10px; overflow: hidden; }
        #stamina-fill { width: 100%; height: 100%; background: linear-gradient(90deg, #ff0000, #ff5555); transition: width 0.1s linear; }
        
        #crosshair { position: absolute; top: 50%; left: 50%; width: 10px; height: 10px; transform: translate(-50%, -50%); border: 1px solid #fff; border-radius: 50%; pointer-events: none; opacity: 0.5; }
    </style>
</head>
<body>

<div id="ui">
    <h1 style="color: #ff0000; font-size: 50px;">VOID AURA</h1>
    <button id="start">START MISSION</button>
    <p style="color: #666; margin-top: 20px;">WASD: Move | SHIFT: Sprint | SPACE: Jump | C: Crouch</p>
</div>

<div id="crosshair"></div>
<div id="stamina-container"><div id="stamina-fill"></div></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/controls/PointerLockControls.js"></script>
<script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/loaders/GLTFLoader.js"></script>

<script>
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x020202);
    
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputEncoding = THREE.sRGBEncoding;
    document.body.appendChild(renderer.domElement);

    const ambient = new THREE.AmbientLight(0xffffff, 1.0); 
    scene.add(ambient);

    const controls = new THREE.PointerLockControls(camera, document.body);
    const ui = document.getElementById('ui');
    const startBtn = document.getElementById('start');

    startBtn.addEventListener('click', () => { controls.lock(); });
    controls.addEventListener('lock', () => ui.style.display = 'none');
    controls.addEventListener('unlock', () => ui.style.display = 'flex');

    const ground = new THREE.Mesh(new THREE.PlaneGeometry(1000, 1000), new THREE.MeshStandardMaterial({ color: 0x0a0a0a }));
    ground.rotation.x = -Math.PI / 2;
    scene.add(ground);

    /* --- GHOST GIRL --- */
    let ghost = null, mixer = null;
    const clock = new THREE.Clock();
    const loader = new THREE.GLTFLoader();

    loader.load('./ghost_girl.glb', (gltf) => {
        ghost = gltf.scene;
        ghost.scale.set(1.5, 1.5, 1.5);
        ghost.position.set(25, 0, 25);
        scene.add(ghost);
        mixer = new THREE.AnimationMixer(ghost);
        if (gltf.animations.length > 0) mixer.clipAction(gltf.animations[0]).play();
    });

    // --- ADVANCED PHYSICS & MOVEMENT ---
    const keys = {};
    document.addEventListener('keydown', (e) => keys[e.code] = true);
    document.addEventListener('keyup', (e) => keys[e.code] = false);

    let velocityY = 0;
    let isJumping = false;
    let stamina = 100;
    let playerHeight = 1.7;

    function animate() {
        requestAnimationFrame(animate);
        const delta = clock.getDelta();
        if (mixer) mixer.update(delta);

        if (controls.isLocked) {
            // Stamina & Sprint Logic
            let isSprinting = (keys['ShiftLeft'] || keys['ShiftRight']) && stamina > 0;
            let isCrouching = keys['KeyC'];
            
            let speed = 0.15; // Default walk
            if (isSprinting) {
                speed = 0.35;
                stamina -= 0.8; // Stamina depletion
            } else {
                stamina += 0.3; // Recovery
            }
            if (isCrouching) speed = 0.07;
            
            stamina = Math.min(100, Math.max(0, stamina));
            document.getElementById('stamina-fill').style.width = stamina + "%";

            // Crouch Height Logic
            let targetHeight = isCrouching ? 0.8 : 1.7;
            playerHeight += (targetHeight - playerHeight) * 0.1; // Smooth crouch

            // WASD Movement
            if (keys['KeyW'] || keys['ArrowUp']) controls.moveForward(speed);
            if (keys['KeyS'] || keys['ArrowDown']) controls.moveForward(-speed);
            if (keys['KeyA'] || keys['ArrowLeft']) controls.moveRight(-speed);
            if (keys['KeyD'] || keys['ArrowRight']) controls.moveRight(speed);

            // Jump Logic
            if (keys['Space'] && !isJumping) {
                velocityY = 0.25;
                isJumping = true;
            }

            // Gravity
            camera.position.y += velocityY;
            velocityY -= 0.012; // Gravity force

            if (camera.position.y <= playerHeight) {
                camera.position.y = playerHeight;
                velocityY = 0;
                isJumping = false;
            }

            // Ghost AI
            if (ghost) {
                let dist = ghost.position.distanceTo(camera.position);
                let ghostDir = new THREE.Vector3().subVectors(camera.position, ghost.position);
                ghostDir.y = 0; ghostDir.normalize();
                ghost.position.add(ghostDir.multiplyScalar(0.12));
                ghost.lookAt(camera.position.x, 0, camera.position.z);
                if (dist < 1.6) {
                    controls.unlock();
                    alert("SHE CAUGHT YOU!");
                    location.reload();
                }
            }
        }
        renderer.render(scene, camera);
    }
    animate();

    window.onresize = () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    };
</script>
</body>
</html>
