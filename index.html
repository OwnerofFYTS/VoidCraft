<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOID AURA | BRIGHT VERSION</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #eee; color: #000; font-family: 'Segoe UI', sans-serif; }
        #game-container { position: relative; width: 100%; height: 100vh; }
        
        #ui-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.9); display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 10000; text-align: center;
        }

        /* Center Crosshair */
        #crosshair {
            position: absolute; top: 50%; left: 50%;
            width: 20px; height: 20px;
            transform: translate(-50%, -50%);
            z-index: 5000; pointer-events: none;
        }
        #crosshair::before, #crosshair::after {
            content: ''; position: absolute; background: #ff4400;
        }
        #crosshair::before { top: 50%; left: 0; width: 100%; height: 2px; transform: translateY(-50%); }
        #crosshair::after { left: 50%; top: 0; width: 2px; height: 100%; transform: translateX(-50%); }

        .hotbar {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 10px; z-index: 9999;
        }
        .slot {
            width: 65px; height: 65px; background: rgba(255,255,255,0.9);
            border: 2px solid #999; display: flex; justify-content: center; align-items: center; border-radius: 5px;
        }
        .slot.active { border-color: #ff4400; box-shadow: 0 0 15px #ff4400; }

        #stamina-bar {
            position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
            width: 250px; height: 12px; background: #ccc; border: 1px solid #ff4400; border-radius: 10px; overflow: hidden;
        }
        #stamina-fill { width: 100%; height: 100%; background: #ff4400; }

        #game-over {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: white; display: none; z-index: 20000;
            flex-direction: column; justify-content: center; align-items: center;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="ui-overlay">
        <h1 style="color: #ff4400; font-size: 3rem;">VOID AURA (BRIGHT)</h1>
        <p>SPACE: Jump | CTRL: Run | SHIFT: Crouch | 1: Flashlight</p>
        <button id="start-btn" style="padding: 15px 40px; cursor: pointer; background: #ff4400; border: none; color: white; font-weight: bold; border-radius: 5px;">START GAME</button>
    </div>

    <div id="crosshair"></div>

    <div class="hotbar">
        <div class="slot" id="slot-1">🔦</div>
        <div class="slot"></div><div class="slot"></div><div class="slot"></div>
    </div>

    <div id="stamina-bar"><div id="stamina-fill"></div></div>
    
    <div id="game-over">
        <h1 style="color: red;">POTATO CAUGHT YOU!</h1>
        <button onclick="location.reload()" style="padding: 10px 30px;">RETRY</button>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/controls/PointerLockControls.js"></script>

<script>
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xdddddd); // Bright background
    scene.fog = new THREE.Fog(0xdddddd, 10, 100);

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.getElementById('game-container').appendChild(renderer.domElement);

    const player = new THREE.Group();
    player.position.set(0, 1.7, 0);
    scene.add(player);
    player.add(camera);

    // --- BRIGHT LIGHTING ---
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.8); // High ambient brightness
    scene.add(ambientLight);
    
    const sunLight = new THREE.DirectionalLight(0xffffff, 0.5);
    sunLight.position.set(5, 10, 5);
    scene.add(sunLight);

    // Flashlight Beam
    const torch = new THREE.SpotLight(0xffffff, 0, 80, Math.PI/6, 0.3, 1);
    camera.add(torch);
    torch.target.position.set(0, 0, -1);
    camera.add(torch.target);

    const grid = new THREE.GridHelper(500, 50, 0x999999, 0xbbbbbb);
    scene.add(grid);

    // --- POTATO ---
    const potatoGeo = new THREE.SphereGeometry(1.6, 32, 32);
    potatoGeo.scale(1.2, 1.5, 1.1);
    const potatoMat = new THREE.MeshStandardMaterial({ color: 0x8B4513, roughness: 0.5 });
    const stalker = new THREE.Mesh(potatoGeo, potatoMat);
    stalker.position.set(0, 1.6, 30);
    scene.add(stalker);

    const controls = new THREE.PointerLockControls(camera, document.body);
    document.getElementById('start-btn').onclick = () => controls.lock();
    controls.addEventListener('lock', () => document.getElementById('ui-overlay').style.display = 'none');

    let keys = {};
    let stamina = 100;
    let isFlashlightOn = false;
    let velocityY = 0;
    let canJump = false;

    window.onkeydown = (e) => {
        keys[e.code] = true;
        if(e.key === '1') {
            isFlashlightOn = !isFlashlightOn;
            torch.intensity = isFlashlightOn ? 10 : 0;
            document.getElementById('slot-1').classList.toggle('active', isFlashlightOn);
        }
    };
    window.onkeyup = (e) => keys[e.code] = false;

    function gameLoop() {
        requestAnimationFrame(gameLoop);
        if (controls.isLocked) {
            // Crouch (SHIFT)
            let targetHeight = keys['ShiftLeft'] ? 0.9 : 1.7;
            player.position.y += (targetHeight - player.position.y) * 0.15;

            // Sprint (CTRL)
            let isRunning = keys['ControlLeft'] && stamina > 0;
            let speed = isRunning ? 0.25 : 0.12;

            if (isRunning && (keys['KeyW'] || keys['KeyS'] || keys['KeyA'] || keys['KeyD'])) stamina -= 0.5;
            else if (stamina < 100) stamina += 0.3;
            document.getElementById('stamina-fill').style.width = stamina + "%";

            if (keys['KeyW']) controls.moveForward(speed);
            if (keys['KeyS']) controls.moveForward(-speed);
            if (keys['KeyA']) controls.moveRight(-speed);
            if (keys['KeyD']) controls.moveRight(speed);

            // Jump (SPACE)
            if (keys['Space'] && canJump) {
                velocityY = 0.18;
                canJump = false;
            }
            player.position.y += velocityY;
            if (player.position.y > targetHeight) {
                velocityY -= 0.01;
            } else {
                player.position.y = targetHeight;
                velocityY = 0;
                canJump = true;
            }

            // Potato AI
            const dir = new THREE.Vector3().subVectors(player.position, stalker.position);
            dir.y = 0; dir.normalize();
            stalker.position.add(dir.multiplyScalar(0.06));
            stalker.lookAt(player.position.x, 1.6, player.position.z);

            if (player.position.distanceTo(stalker.position) < 2.5) {
                document.getElementById('game-over').style.display = 'flex';
                controls.unlock();
            }
        }
        renderer.render(scene, camera);
    }
    gameLoop();
</script>
</body>
</html>
