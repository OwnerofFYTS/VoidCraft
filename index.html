<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOID AURA | POWER FLASH-POTATO</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; color: #fff; font-family: sans-serif; }
        #game-container { position: relative; width: 100%; height: 100vh; }
        
        #ui-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #1a0d00 0%, #000 100%);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 10000;
        }

        #hotbar {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 15px; z-index: 9999;
        }
        .slot {
            width: 75px; height: 75px; background: rgba(20, 15, 5, 0.9);
            border: 3px solid #333; display: flex; justify-content: center;
            align-items: center; font-weight: bold; position: relative;
        }
        .slot.active { border-color: #ffaa00; box-shadow: 0 0 20px rgba(255, 170, 0, 0.5); background: rgba(50, 35, 10, 0.9); }
        .slot-num { position: absolute; top: 5px; left: 8px; font-size: 12px; color: #888; }
        .item-icon { font-size: 2.2rem; }

        #stamina-box {
            position: fixed; bottom: 125px; left: 50%; transform: translateX(-50%);
            width: 220px; height: 10px; background: #111; border: 1px solid #640; z-index: 9999;
        }
        #stamina-fill { width: 100%; height: 100%; background: linear-gradient(90deg, #840, #ffaa00); }

        #crosshair { position: absolute; top: 50%; left: 50%; width: 4px; height: 4px; background: rgba(255, 170, 0, 0.6); border-radius: 50%; z-index: 5000; transform: translate(-50%, -50%); }
        
        #game-over-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(20, 10, 0, 0.95); display: none; z-index: 20000;
            flex-direction: column; justify-content: center; align-items: center;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="ui-overlay">
        <h1 style="font-size: 60px; color: #ffaa00; letter-spacing: 15px; margin: 0;">VOID AURA</h1>
        <p style="color: #666; margin-bottom: 30px;">PRESS 1 FOR FLASHLIGHT</p>
        <button id="start-btn" style="padding: 18px 60px; font-size: 22px; background: none; border: 2px solid #ffaa00; color: #ffaa00; cursor: pointer; font-weight: bold;">START PROTOCOL</button>
    </div>

    <div id="hotbar">
        <div class="slot" id="slot-1"><span class="slot-num">1</span><span class="item-icon">🔦</span></div>
        <div class="slot" id="slot-2"><span class="slot-num">2</span></div>
        <div class="slot" id="slot-3"><span class="slot-num">3</span></div>
        <div class="slot" id="slot-4"><span class="slot-num">4</span></div>
    </div>

    <div id="stamina-box"><div id="stamina-fill"></div></div>
    <div id="crosshair"></div>
    
    <div id="game-over-screen">
        <h1 style="color: #ffaa00; font-size: 70px; margin: 0;">MASHED</h1>
        <p style="color: #fff; letter-spacing: 5px;">THE POTATO FOUND YOU</p>
        <button onclick="location.reload()" style="margin-top: 30px; padding: 12px 40px; color: #fff; background: none; border: 1px solid #fff; cursor: pointer;">REBOOT</button>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/controls/PointerLockControls.js"></script>

<script>
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x020100);
    scene.fog = new THREE.Fog(0x020100, 1, 50);

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true; // For better light effects
    document.getElementById('game-container').appendChild(renderer.domElement);

    const player = new THREE.Group();
    player.position.set(0, 1.7, 0);
    scene.add(player);
    player.add(camera);

    // --- ENHANCED FLASHLIGHT ---
    const torch = new THREE.SpotLight(0xfff0dd, 0, 60, Math.PI/6, 0.5, 1);
    torch.position.set(0.2, -0.2, -0.1); // Slightly off center like holding it
    camera.add(torch);
    torch.target.position.set(0, 0, -5); // Light points where you look
    camera.add(torch.target);

    scene.add(new THREE.AmbientLight(0xffffff, 0.02));
    const grid = new THREE.GridHelper(500, 100, 0x221100, 0x050505);
    scene.add(grid);

    // --- POTATO STALKER (THORA BADA SIZE) ---
    const potatoGeo = new THREE.SphereGeometry(1.4, 32, 32); 
    potatoGeo.scale(1.3, 1.7, 1.2); // Final fixed larger size
    const potatoMat = new THREE.MeshStandardMaterial({ 
        color: 0x5c3d24, 
        roughness: 1.0,
        metalness: 0.0
    });
    const stalker = new THREE.Mesh(potatoGeo, potatoMat);
    stalker.position.set(0, 1.8, 30);
    scene.add(stalker);

    const controls = new THREE.PointerLockControls(camera, document.body);
    const startBtn = document.getElementById('start-btn');

    startBtn.onclick = () => {
        controls.lock();
        if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
    };

    controls.addEventListener('lock', () => {
        document.getElementById('ui-overlay').style.display = 'none';
    });

    let keys = {};
    let stamina = 100;
    let activeSlot = null;

    window.onkeydown = (e) => {
        keys[e.code] = true;
        if(e.key === '1' || e.key === '2' || e.key === '3' || e.key === '4') selectSlot(parseInt(e.key));
    };
    window.onkeyup = (e) => keys[e.code] = false;

    function selectSlot(n) {
        document.querySelectorAll('.slot').forEach(s => s.classList.remove('active'));
        if (activeSlot === n) {
            activeSlot = null;
            torch.intensity = 0;
        } else {
            activeSlot = n;
            document.getElementById(`slot-${n}`).classList.add('active');
            if(n === 1) torch.intensity = 8.0; // Very strong directional light
            else torch.intensity = 0;
        }
    }

    let lastT = performance.now();
    function gameLoop() {
        requestAnimationFrame(gameLoop);
        const time = performance.now();
        const delta = (time - lastT) / 1000;

        if (controls.isLocked) {
            // Movement logic
            let isRunning = keys['ShiftLeft'] && stamina > 0;
            let speed = isRunning ? 32 : 20;
            
            if (isRunning && (keys['KeyW'] || keys['KeyS'] || keys['KeyA'] || keys['KeyD'])) {
                stamina = Math.max(0, stamina - 25 * delta);
            } else {
                stamina = Math.min(100, stamina + 15 * delta);
            }
            document.getElementById('stamina-fill').style.width = stamina + "%";

            if (keys['KeyW']) controls.moveForward(speed * delta);
            if (keys['KeyS']) controls.moveForward(-speed * delta);
            if (keys['KeyA']) controls.moveRight(-speed * delta);
            if (keys['KeyD']) controls.moveRight(speed * delta);

            // Potato AI
            const dir = new THREE.Vector3().subVectors(player.position, stalker.position);
            dir.y = 0; dir.normalize();
            stalker.position.x += dir.x * 5.2 * delta; 
            stalker.position.z += dir.z * 5.2 * delta;
            stalker.lookAt(player.position.x, 1.8, player.position.z);

            // Kill Zone
            if (player.position.distanceTo(stalker.position) < 2.5) {
                document.getElementById('game-over-screen').style.display = 'flex';
                controls.unlock();
            }
        }
        lastT = time;
        renderer.render(scene, camera);
    }
    gameLoop();

    window.onresize = () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    };
</script>
</body>
</html>
